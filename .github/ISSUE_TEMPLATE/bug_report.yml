name: Bug Report
description: Report a defect or regression in Cheatsheets
title: "[Bug]: "
labels:
- bug
body:
- type: textarea
  id: summary
  attributes:
    label: Summary
    description: What is broken?
    placeholder: A clear and concise bug summary.
  validations:
    required: true

- type: textarea
  id: steps
  attributes:
    label: Steps to Reproduce
    description: Provide exact steps to reproduce the issue.
    placeholder: |
      1. Go to ...
      2. Click on ...
      3. Observe ...
  validations:
    required: true

- type: textarea
  id: expected
  attributes:
    label: Expected Behavior
    description: What should happen?
  validations:
    required: true

- type: textarea
  id: actual
  attributes:
    label: Actual Behavior
    description: What happens instead?
  validations:
    required: true

- type: input
  id: environment
  attributes:
    label: Environment
    description: Browser, OS, and app route/page.
    placeholder: Chrome 123, Windows 11, /springboot/security

- type: textarea
  id: logs
  attributes:
    label: Logs or Screenshots
    description: Paste console logs or add screenshots if useful.
