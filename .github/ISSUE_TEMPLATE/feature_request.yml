name: Feature Request
description: Suggest an enhancement for Cheatsheets
title: "[Feature]: "
labels:
- enhancement
body:
- type: textarea
  id: problem
  attributes:
    label: Problem Statement
    description: What developer pain point does this solve?
    placeholder: As a learner, I want ... so that ...
  validations:
    required: true

- type: textarea
  id: proposal
  attributes:
    label: Proposed Solution
    description: Describe your proposed approach.
  validations:
    required: true

- type: textarea
  id: alternatives
  attributes:
    label: Alternatives Considered
    description: Any alternatives or tradeoffs considered?

- type: textarea
  id: acceptance
  attributes:
    label: Acceptance Criteria
    description: List clear criteria for done.
    placeholder: |
      - [ ] ...
      - [ ] ...

- type: textarea
  id: context
  attributes:
    label: Additional Context
    description: Links, mockups, examples, or references.
